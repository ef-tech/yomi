<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>yomi</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button
        type="button"
        id="menu-btn"
        class="menu-btn"
        aria-label="ファイルツリーを開く"
        aria-expanded="false"
        title="ファイルツリー"
      >☰</button>
      <h1 class="brand">yomi</h1>
      <div class="theme-toggle" role="group" aria-label="テーマ">
        <button
          type="button"
          class="theme-toggle-btn"
          data-theme-mode="auto"
          title="システム設定に追従"
          aria-pressed="true"
        >自動</button>
        <button
          type="button"
          class="theme-toggle-btn"
          data-theme-mode="light"
          title="ライトテーマ"
          aria-pressed="false"
        >ライト</button>
        <button
          type="button"
          class="theme-toggle-btn"
          data-theme-mode="dark"
          title="ダークテーマ"
          aria-pressed="false"
        >ダーク</button>
      </div>
      <button
        type="button"
        id="toc-btn"
        class="toc-btn"
        aria-pressed="false"
        title="目次 (Ctrl/Cmd+Shift+O)"
      >📖 目次</button>
      <div class="status" id="status" aria-live="polite"></div>
      <button
        type="button"
        id="overflow-btn"
        class="overflow-btn"
        aria-label="メニュー"
        aria-expanded="false"
        title="メニュー"
      >⋮</button>
    </header>
    <div id="overflow-menu" class="overflow-menu" role="menu" aria-label="メニュー" hidden>
      <div class="overflow-section">
        <div class="overflow-label">テーマ</div>
        <div class="overflow-theme">
          <button type="button" class="overflow-theme-btn" data-theme-mode="auto">自動</button>
          <button type="button" class="overflow-theme-btn" data-theme-mode="light">ライト</button>
          <button type="button" class="overflow-theme-btn" data-theme-mode="dark">ダーク</button>
        </div>
      </div>
      <div class="overflow-section">
        <div class="overflow-label">表示モード</div>
        <div class="overflow-view">
          <button type="button" class="overflow-view-btn" data-mode="preview">プレビュー</button>
          <button type="button" class="overflow-view-btn" data-mode="md">MD</button>
        </div>
      </div>
      <div class="overflow-section">
        <button type="button" id="overflow-edit" class="overflow-action">✏️ 編集モード</button>
      </div>
    </div>
    <main class="layout">
      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>
      <aside id="sidebar" class="sidebar" aria-label="ファイルツリー">
        <nav id="tree" class="tree" aria-busy="true">読み込み中…</nav>
      </aside>
      <section class="content">
        <div class="content-header">
          <button
            type="button"
            id="current-path"
            class="current-path"
            aria-label="表示中のファイルパス。タップでコピー"
            title="タップでパスをコピー"
            disabled
          ></button>
          <span id="dirty-indicator" class="dirty-indicator" aria-live="polite" hidden>● 未保存</span>
          <div class="edit-actions">
            <button
              type="button"
              id="edit-btn"
              class="edit-btn"
              aria-pressed="false"
              title="ブラウザ内で編集する"
            >編集</button>
            <button
              type="button"
              id="discard-btn"
              class="discard-btn"
              title="編集を破棄して閉じる"
              hidden
            >破棄</button>
          </div>
          <div class="view-toggle" role="tablist" aria-label="表示モード">
            <button
              type="button"
              class="view-toggle-btn"
              data-mode="preview"
              role="tab"
              aria-selected="true"
              title="プレビューのみ"
            >プレビュー</button>
            <button
              type="button"
              class="view-toggle-btn"
              data-mode="split"
              role="tab"
              aria-selected="false"
              title="Markdown とプレビューを並列表示"
            >並列</button>
            <button
              type="button"
              class="view-toggle-btn"
              data-mode="md"
              role="tab"
              aria-selected="false"
              title="Markdown ソースのみ"
            >MD</button>
          </div>
        </div>
        <div
          id="conflict-banner"
          class="conflict-banner"
          role="alert"
          hidden
        >
          <span class="conflict-message">他の場所でファイルが更新されています。</span>
          <button type="button" id="conflict-take-server" class="conflict-action">
            サーバ内容を取り込む
          </button>
          <button type="button" id="conflict-overwrite" class="conflict-action is-danger">
            強制上書き
          </button>
          <button type="button" id="conflict-dismiss" class="conflict-action">
            閉じる
          </button>
        </div>
        <div
          id="external-link-banner"
          class="conflict-banner external-link-banner"
          role="alertdialog"
          aria-labelledby="external-link-title"
          hidden
        >
          <span id="external-link-title" class="conflict-message">
            外部 URL を開きますか?
            <span id="external-link-url" class="external-link-url"></span>
          </span>
          <button type="button" id="external-link-cancel" class="conflict-action">
            閉じる
          </button>
          <button type="button" id="external-link-open" class="conflict-action is-primary">
            開く
          </button>
        </div>
        <div id="content-body" class="content-body" data-mode="preview">
          <pre id="source" class="source"></pre>
          <textarea
            id="editor"
            class="editor"
            spellcheck="false"
            autocomplete="off"
            aria-label="Markdown エディタ"
            hidden
          ></textarea>
          <article id="preview" class="preview markdown-body">
            <p class="placeholder">左のツリーから Markdown ファイルを選択してください。</p>
          </article>
          <aside id="toc-panel" class="toc-panel" hidden aria-label="目次">
            <header class="toc-header">
              <span class="toc-title">目次</span>
              <button type="button" id="toc-close" class="toc-close" aria-label="目次を閉じる" title="閉じる">✕</button>
            </header>
            <nav id="toc-list" class="toc-list" aria-label="見出し一覧"></nav>
            <footer class="toc-footer">
              <button
                type="button"
                id="toc-expand-toggle"
                class="toc-expand-toggle"
                aria-pressed="false"
                title="H4 以下も表示"
              >▾ H4- 展開</button>
            </footer>
          </aside>
          <button
            type="button"
            id="toc-fab"
            class="toc-fab"
            aria-label="目次"
            title="目次"
            disabled
          >📖</button>
        </div>
      </section>
    </main>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
