<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>yomi</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="brand">yomi</h1>
      <div class="theme-toggle" role="group" aria-label="テーマ">
        <button
          type="button"
          class="theme-toggle-btn"
          data-theme-mode="auto"
          title="システム設定に追従"
          aria-pressed="true"
        >自動</button>
        <button
          type="button"
          class="theme-toggle-btn"
          data-theme-mode="light"
          title="ライトテーマ"
          aria-pressed="false"
        >ライト</button>
        <button
          type="button"
          class="theme-toggle-btn"
          data-theme-mode="dark"
          title="ダークテーマ"
          aria-pressed="false"
        >ダーク</button>
      </div>
      <div class="status" id="status" aria-live="polite"></div>
    </header>
    <main class="layout">
      <aside class="sidebar" aria-label="ファイルツリー">
        <nav id="tree" class="tree" aria-busy="true">読み込み中…</nav>
      </aside>
      <section class="content">
        <div class="content-header">
          <span id="current-path" class="current-path" aria-live="polite"></span>
          <span id="dirty-indicator" class="dirty-indicator" aria-live="polite" hidden>● 未保存</span>
          <div class="edit-actions">
            <button
              type="button"
              id="edit-btn"
              class="edit-btn"
              aria-pressed="false"
              title="ブラウザ内で編集する"
            >編集</button>
            <button
              type="button"
              id="discard-btn"
              class="discard-btn"
              title="編集を破棄して閉じる"
              hidden
            >破棄</button>
          </div>
          <div class="view-toggle" role="tablist" aria-label="表示モード">
            <button
              type="button"
              class="view-toggle-btn"
              data-mode="preview"
              role="tab"
              aria-selected="true"
              title="プレビューのみ"
            >プレビュー</button>
            <button
              type="button"
              class="view-toggle-btn"
              data-mode="split"
              role="tab"
              aria-selected="false"
              title="Markdown とプレビューを並列表示"
            >並列</button>
            <button
              type="button"
              class="view-toggle-btn"
              data-mode="md"
              role="tab"
              aria-selected="false"
              title="Markdown ソースのみ"
            >MD</button>
          </div>
        </div>
        <div
          id="conflict-banner"
          class="conflict-banner"
          role="alert"
          hidden
        >
          <span class="conflict-message">他の場所でファイルが更新されています。</span>
          <button type="button" id="conflict-take-server" class="conflict-action">
            サーバ内容を取り込む
          </button>
          <button type="button" id="conflict-overwrite" class="conflict-action is-danger">
            強制上書き
          </button>
          <button type="button" id="conflict-dismiss" class="conflict-action">
            閉じる
          </button>
        </div>
        <div id="content-body" class="content-body" data-mode="preview">
          <pre id="source" class="source"></pre>
          <textarea
            id="editor"
            class="editor"
            spellcheck="false"
            autocomplete="off"
            aria-label="Markdown エディタ"
            hidden
          ></textarea>
          <article id="preview" class="preview markdown-body">
            <p class="placeholder">左のツリーから Markdown ファイルを選択してください。</p>
          </article>
        </div>
      </section>
    </main>
    <script type="module" src="/assets/app.js"></script>
  </body>
</html>
